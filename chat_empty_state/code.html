<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Space+Grotesk:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-tertiary-fixed": "#002113",
                      "on-primary-container": "#858383",
                      "secondary-container": "#6063ee",
                      "error-container": "#ffdad6",
                      "primary-fixed": "#e5e2e1",
                      "on-background": "#1a1c1c",
                      "surface-container": "#eeeeee",
                      "surface-container-highest": "#e2e2e2",
                      "surface-bright": "#f9f9f9",
                      "surface-container-low": "#f3f3f3",
                      "outline": "#747878",
                      "inverse-surface": "#2f3131",
                      "on-secondary-fixed": "#07006c",
                      "surface": "#f9f9f9",
                      "surface-tint": "#5f5e5e",
                      "surface-container-lowest": "#ffffff",
                      "background": "#f9f9f9",
                      "on-tertiary-container": "#009668",
                      "secondary-fixed": "#e1e0ff",
                      "surface-dim": "#dadada",
                      "on-secondary-fixed-variant": "#2f2ebe",
                      "primary": "#000000",
                      "on-primary": "#ffffff",
                      "on-surface": "#1a1c1c",
                      "on-secondary-container": "#fffbff",
                      "on-primary-fixed": "#1c1b1b",
                      "outline-variant": "#c4c7c7",
                      "primary-fixed-dim": "#c9c6c5",
                      "on-error": "#ffffff",
                      "on-tertiary-fixed-variant": "#005236",
                      "tertiary-fixed": "#6ffbbe",
                      "on-tertiary": "#ffffff",
                      "on-secondary": "#ffffff",
                      "primary-container": "#1c1b1b",
                      "surface-container-high": "#e8e8e8",
                      "inverse-on-surface": "#f0f1f1",
                      "tertiary": "#000000",
                      "tertiary-container": "#002113",
                      "error": "#ba1a1a",
                      "tertiary-fixed-dim": "#4edea3",
                      "secondary": "#4648d4",
                      "inverse-primary": "#c9c6c5",
                      "on-error-container": "#93000a",
                      "surface-variant": "#e2e2e2",
                      "secondary-fixed-dim": "#c0c1ff",
                      "on-surface-variant": "#444748",
                      "on-primary-fixed-variant": "#474646"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "stack-lg": "32px",
                      "stack-sm": "8px",
                      "container-max": "800px",
                      "gutter": "24px",
                      "prompt-padding": "20px 24px",
                      "sidebar-width": "260px",
                      "stack-md": "16px"
              },
              "fontFamily": {
                      "body-md": ["Inter"],
                      "body-lg": ["Inter"],
                      "h2": ["Inter"],
                      "code": ["Space Grotesk"],
                      "label-sm": ["Inter"],
                      "h1": ["Inter"]
              },
              "fontSize": {
                      "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                      "h2": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                      "code": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                      "label-sm": ["13px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "500"}],
                      "h1": ["40px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600"}]
              }
            },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-size: 20px;
        }
        .sidebar-item-active { background-color: rgba(226, 226, 226, 0.5); }
    </style>
</head>
<body class="bg-[#f9f9f9] font-body-md text-on-background antialiased overflow-hidden">
<!-- Top AppBar (Mobile/Global) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 h-14 bg-white/70 backdrop-blur-xl border-b border-zinc-200/50 md:hidden">
<div class="text-lg font-bold tracking-tighter text-zinc-900">Framr</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-zinc-900" data-icon="settings">settings</span>
<span class="material-symbols-outlined text-zinc-900" data-icon="account_circle">account_circle</span>
</div>
</header>
<div class="flex h-screen w-full">
<!-- Sidebar Navigation -->
<aside class="fixed left-0 top-0 h-full flex flex-col p-4 z-40 bg-zinc-50 border-r border-zinc-200 w-[260px] hidden md:flex">
<div class="flex flex-col gap-1 mb-8">
<div class="flex items-center gap-3 px-2 mb-2">
<div class="w-8 h-8 rounded-lg bg-zinc-900 flex items-center justify-center text-white">
<span class="material-symbols-outlined" data-icon="token" style="font-variation-settings: 'FILL' 1;">token</span>
</div>
<div>
<h1 class="text-xl font-black text-zinc-900 leading-none">Framr</h1>
<p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold">AI Workspace</p>
</div>
</div>
</div>
<!-- Main Actions -->
<nav class="flex-1 overflow-y-auto space-y-1">
<button class="w-full flex items-center gap-3 px-3 py-2 bg-zinc-200/50 text-zinc-900 rounded-lg transition-colors font-medium text-[13px]">
<span class="material-symbols-outlined" data-icon="add">add</span>
                    New Chat
                </button>
<div class="pt-6 pb-2 px-3 text-[11px] font-bold text-zinc-400 uppercase tracking-wider">Recent Activity</div>
<button class="w-full flex items-center gap-3 px-3 py-2 text-zinc-600 hover:bg-zinc-100 transition-colors rounded-lg text-[13px]">
<span class="material-symbols-outlined" data-icon="history">history</span>
                    History
                </button>
<button class="w-full flex items-center gap-3 px-3 py-2 text-zinc-600 hover:bg-zinc-100 transition-colors rounded-lg text-[13px]">
<span class="material-symbols-outlined" data-icon="folder_open">folder_open</span>
                    Library
                </button>
<div class="pt-4 px-3 space-y-3">
<div class="p-3 bg-white border border-zinc-200 rounded-xl">
<p class="text-[12px] text-zinc-500 mb-2">Project: Design System</p>
<div class="h-1.5 w-full bg-zinc-100 rounded-full overflow-hidden">
<div class="h-full bg-zinc-900 w-3/4"></div>
</div>
</div>
</div>
</nav>
<!-- Footer Section -->
<div class="mt-auto pt-4 border-t border-zinc-200 space-y-1">
<button class="w-full flex items-center justify-between px-3 py-2 bg-zinc-900 text-zinc-50 rounded-lg hover:opacity-90 transition-opacity mb-4">
<span class="text-[13px] font-semibold">Upgrade to Pro</span>
<span class="material-symbols-outlined text-sm" data-icon="north_east">north_east</span>
</button>
<button class="w-full flex items-center gap-3 px-3 py-2 text-zinc-600 hover:bg-zinc-100 transition-colors rounded-lg text-[13px]">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
                    Settings
                </button>
<button class="w-full flex items-center gap-3 px-3 py-2 text-zinc-600 hover:bg-zinc-100 transition-colors rounded-lg text-[13px]">
<div class="w-5 h-5 rounded-full overflow-hidden bg-zinc-200">
<img class="w-full h-full object-cover" data-alt="Close-up portrait of a professional woman with a clean minimal aesthetic and soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCX-x5CmBVG4ny1VHudRetepSu5pWXmi8fRlK1WLdjwdQ0xQRzqBSsYO9xxpkIZpSE9c9q8eMfnPszHOvSFwjigy_D-WhiMB6Bd5qMM-9uflWQ5MMChL4HtWELVAegHAMFKi6HNso3EmoIehEG42dbwGPzzSZsnZWLB42w56vBth1FIeVzBkwI1PI5E-oEJoTtxGAaLQUcZRT1Fu0JEq9eQ2eBnWHTEXy2B3G4s0cMn-UTAUJ3LltiJyC1Tkv8XVErNtMnCl6jOxfA"/>
</div>
                    Account
                </button>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center relative px-6 md:ml-[260px]">
<!-- Model Selection Top Pill -->
<div class="absolute top-8 md:top-12 flex items-center p-1 bg-white border border-zinc-200/60 rounded-full shadow-sm">
<button class="px-4 py-1.5 rounded-full bg-zinc-900 text-white text-label-sm font-label-sm transition-all">Core</button>
<button class="px-4 py-1.5 rounded-full text-zinc-500 hover:text-zinc-900 text-label-sm font-label-sm transition-all">Extended</button>
<button class="px-4 py-1.5 rounded-full text-zinc-500 hover:text-zinc-900 text-label-sm font-label-sm transition-all">Research</button>
</div>
<!-- Empty State Centered Column -->
<div class="w-full max-w-[800px] flex flex-col items-center gap-12 mb-20">
<div class="text-center space-y-4">
<h2 class="font-h1 text-h1 text-zinc-900 tracking-tighter">How can I help you today?</h2>
<p class="font-body-lg text-zinc-400 max-w-lg mx-auto">Experience the next generation of creative reasoning and professional workflow.</p>
</div>
<!-- Main Prompt Composer -->
<div class="w-full relative group">
<div class="bg-white border border-zinc-200 rounded-[36px] p-2 shadow-[0_8px_30px_rgb(0,0,0,0.04)] focus-within:shadow-[0_20px_50px_rgba(0,0,0,0.08)] transition-all duration-300">
<div class="flex items-end px-4 pt-4 pb-2">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-zinc-900 font-body-lg resize-none min-h-[60px] max-h-[300px] py-2" placeholder="Ask anything..." rows="1"></textarea>
</div>
<div class="flex items-center justify-between p-2">
<div class="flex items-center gap-1">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-zinc-400 hover:bg-zinc-50 transition-colors">
<span class="material-symbols-outlined" data-icon="add_circle">add_circle</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-zinc-400 hover:bg-zinc-50 transition-colors">
<span class="material-symbols-outlined" data-icon="image">image</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-zinc-400 hover:bg-zinc-50 transition-colors">
<span class="material-symbols-outlined" data-icon="language">language</span>
</button>
<div class="h-6 w-[1px] bg-zinc-200 mx-2"></div>
<button class="flex items-center gap-2 px-3 py-1.5 rounded-full border border-zinc-100 bg-zinc-50/50 text-[12px] font-semibold text-zinc-600 hover:bg-zinc-100 transition-colors">
<span class="material-symbols-outlined !text-[16px]" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
                                    Core model active
                                    <span class="material-symbols-outlined !text-[14px]" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</button>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-zinc-900 text-white hover:opacity-90 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="arrow_upward">arrow_upward</span>
</button>
</div>
</div>
<!-- Subtle Bento-ish Suggestion Chips -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3 mt-8">
<button class="flex flex-col items-start p-4 bg-white border border-zinc-200 rounded-2xl hover:border-zinc-400 transition-colors text-left group">
<span class="material-symbols-outlined text-zinc-400 mb-3 group-hover:text-zinc-900 transition-colors" data-icon="edit_note">edit_note</span>
<span class="text-label-sm font-label-sm text-zinc-900">Write a report</span>
<span class="text-[11px] text-zinc-400 mt-1">Market analysis template</span>
</button>
<button class="flex flex-col items-start p-4 bg-white border border-zinc-200 rounded-2xl hover:border-zinc-400 transition-colors text-left group">
<span class="material-symbols-outlined text-zinc-400 mb-3 group-hover:text-zinc-900 transition-colors" data-icon="code">code</span>
<span class="text-label-sm font-label-sm text-zinc-900">Refactor code</span>
<span class="text-[11px] text-zinc-400 mt-1">Optimize Python script</span>
</button>
<button class="flex flex-col items-start p-4 bg-white border border-zinc-200 rounded-2xl hover:border-zinc-400 transition-colors text-left group">
<span class="material-symbols-outlined text-zinc-400 mb-3 group-hover:text-zinc-900 transition-colors" data-icon="insights">insights</span>
<span class="text-label-sm font-label-sm text-zinc-900">Analyze data</span>
<span class="text-[11px] text-zinc-400 mt-1">Upload CSV or JSON</span>
</button>
<button class="flex flex-col items-start p-4 bg-white border border-zinc-200 rounded-2xl hover:border-zinc-400 transition-colors text-left group">
<span class="material-symbols-outlined text-zinc-400 mb-3 group-hover:text-zinc-900 transition-colors" data-icon="palette">palette</span>
<span class="text-label-sm font-label-sm text-zinc-900">Brainstorm ideas</span>
<span class="text-[11px] text-zinc-400 mt-1">Logo concepts &amp; styles</span>
</button>
</div>
</div>
</div>
<!-- Footer Info -->
<footer class="absolute bottom-6 text-zinc-400 text-[11px] font-medium uppercase tracking-widest flex items-center gap-6">
<a class="hover:text-zinc-900 transition-colors" href="#">Privacy</a>
<a class="hover:text-zinc-900 transition-colors" href="#">Safety</a>
<a class="hover:text-zinc-900 transition-colors" href="#">Knowledge Base</a>
<div class="flex items-center gap-1">
<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
                    Systems Operational
                </div>
</footer>
</main>
</div>
</body></html>
